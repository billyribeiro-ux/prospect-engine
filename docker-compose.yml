# Optional local PostgreSQL for PE_DATABASE_URL=postgres://pe:pe@127.0.0.1:5432/prospect
# Start: docker compose up -d postgres

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pe
      POSTGRES_PASSWORD: pe
      POSTGRES_DB: prospect
    volumes:
      - pe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pe -d prospect"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pe_pgdata:
